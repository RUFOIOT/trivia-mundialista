<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎮 Dashboard — Trivia Mundialista</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#042C53;--blue-main:#185FA5;--blue-mid:#378ADD;--blue-light:#E6F1FB;
  --gold:#EF9F27;--gold-light:#FAEEDA;
  --red:#C0392B;--red-light:#FCEBEB;
  --green:#27AE60;--green-light:#EAF3DE;
  --gray:#F4F6FA;--border:rgba(0,0,0,0.1);--text:#0D1B2A;--muted:#5A6A7A;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Inter',sans-serif;background:var(--gray);min-height:100vh;padding:0}

/* TOP BAR */
.topbar{background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo-small{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:.05em}
.logo-small span{color:var(--gold)}
.round-badge{background:rgba(239,159,39,0.2);color:var(--gold);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:10px}
.back-link{color:rgba(255,255,255,0.6);font-size:12px;text-decoration:none;padding:6px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:6px}
.back-link:hover{color:#fff}

/* SCOREBOARD */
.scoreboard{background:var(--blue-main);display:flex;border-bottom:3px solid var(--gold)}
.team-score{flex:1;padding:16px 20px;text-align:center;position:relative}
.team-score.team-a{border-right:1px solid rgba(255,255,255,0.1)}
.team-name{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:700;color:#fff;letter-spacing:.05em;display:flex;align-items:center;justify-content:center;gap:8px}
.team-pts{font-size:2.8rem;font-weight:700;color:#fff;line-height:1;margin:4px 0}
.team-pts.winning{color:var(--gold)}
.team-streak{font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px}
.vs-divider{display:flex;align-items:center;justify-content:center;padding:0 16px;color:rgba(255,255,255,0.4);font-family:'Oswald',sans-serif;font-size:.9rem;font-weight:700}

/* TIMER */
.timer-bar{background:var(--blue);display:flex;align-items:center;justify-content:center;gap:16px;padding:10px 20px}
.timer-display{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;color:#fff;min-width:60px;text-align:center;transition:color .3s}
.timer-display.warning{color:var(--gold)}
.timer-display.danger{color:#E74C3C}
.timer-track{flex:1;max-width:300px;height:6px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden}
.timer-fill{height:6px;background:var(--gold);border-radius:3px;transition:width .9s linear,background .3s}
.timer-fill.warning{background:var(--gold)}
.timer-fill.danger{background:#E74C3C}
.ctrl-btns{display:flex;gap:8px}
.ctrl-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.ctrl-btn:hover{background:rgba(255,255,255,0.2)}
.ctrl-btn.start{background:var(--green);border-color:var(--green)}
.ctrl-btn.danger{background:#C0392B;border-color:#C0392B}

/* MAIN GRID */
.main{display:grid;grid-template-columns:1fr 340px;gap:16px;padding:16px;max-width:1100px;margin:0 auto}

/* QUESTION PANEL */
.panel{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.panel-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.q-counter{font-size:11px;color:var(--blue-main);font-weight:600;background:var(--blue-light);padding:3px 10px;border-radius:20px}

.progress-track{height:4px;background:var(--gray)}
.progress-fill{height:4px;background:var(--gold);transition:width .5s ease}

.q-body{padding:18px}
.q-ronda{font-size:10px;font-weight:700;color:var(--blue-main);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.q-text{font-size:16px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:16px}
.q-answer{background:var(--gold-light);border:1px solid rgba(239,159,39,0.3);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;font-weight:600;color:#7A4F00;margin-bottom:14px;display:none}
.q-answer.show{display:block}
.q-answer span{color:var(--blue);font-weight:400;margin-left:6px}
.opts-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.opt-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:13px;font-weight:500;color:var(--text)}
.opt-row.is-correct{background:var(--green-light);border-color:var(--green);color:#1A5E30}
.opt-letter{width:24px;height:24px;border-radius:50%;background:var(--gray);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}
.opt-row.is-correct .opt-letter{background:var(--green);color:#fff}

/* NAV BUTTONS */
.nav-row{display:flex;gap:10px}
.nav-btn{flex:1;padding:11px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.nav-btn.prev{background:var(--gray);color:var(--muted)}
.nav-btn.prev:hover{background:#e0e3e9}
.nav-btn.next{background:var(--blue-main);color:#fff}
.nav-btn.next:hover{background:var(--blue)}
.nav-btn:disabled{opacity:.4;cursor:default}
.reveal-btn{width:100%;margin-bottom:10px;padding:10px;border-radius:var(--radius-sm);background:var(--gold);color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;letter-spacing:.02em}
.reveal-btn:hover{background:#d4880e}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:12px}

/* BUZZERS */
.buzzer-panel .panel-head{background:#fff}
.buzzer-status{padding:14px}
.buz-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);margin-bottom:8px;transition:all .2s}
.buz-row.winner{border-color:var(--gold);background:var(--gold-light)}
.buz-row.loser{opacity:.5}
.buz-row.waiting{background:var(--gray)}
.buz-dot{width:14px;height:14px;border-radius:50%;background:var(--border);flex-shrink:0}
.buz-row.team-a .buz-dot{background:#C0392B}
.buz-row.team-b .buz-dot{background:var(--blue-main)}
.buz-info{flex:1}
.buz-name{font-size:13px;font-weight:700;color:var(--text)}
.buz-time{font-size:11px;color:var(--muted)}
.buz-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.buz-badge.first{background:var(--gold);color:#fff}
.buz-badge.waiting-badge{background:var(--gray);color:var(--muted)}

.judge-row{display:flex;gap:8px;padding:0 14px 14px}
.judge-btn{flex:1;padding:10px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .15s}
.judge-btn.correct{background:var(--green);color:#fff}
.judge-btn.correct:hover{background:#219150}
.judge-btn.wrong{background:var(--red);color:#fff}
.judge-btn.wrong:hover{background:#a52019}
.judge-btn:disabled{opacity:.3;cursor:default}

/* HISTORY */
.history-list{padding:0 14px 14px;display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto}
.hist-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;background:var(--gray);font-size:12px}
.hist-icon{flex-shrink:0;font-size:14px}
.hist-info{flex:1;line-height:1.4}
.hist-q{font-weight:600;color:var(--text)}
.hist-detail{color:var(--muted)}
.hist-pts{font-weight:700;font-size:13px}
.hist-pts.pos{color:var(--green)}
.hist-pts.neg{color:var(--red)}

/* ROUND badge */
.round-header{background:var(--blue);color:#fff;text-align:center;padding:8px;font-family:'Oswald',sans-serif;font-size:.85rem;letter-spacing:.1em}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-small">TRIVIA <span>MUNDIALISTA</span></div>
    <div class="round-badge">🎮 Dashboard</div>
  </div>
  <div class="topbar-right">
    <a href="index.html" class="back-link">← Inicio</a>
  </div>
</div>

<div class="scoreboard">
  <div class="team-score team-a">
    <div class="team-name">🔴 EQUIPO A</div>
    <div class="team-pts" id="pts-a">0</div>
    <div class="team-streak" id="streak-a">Racha: 0 🔥</div>
  </div>
  <div class="vs-divider">VS</div>
  <div class="team-score team-b">
    <div class="team-name">🔵 EQUIPO B</div>
    <div class="team-pts" id="pts-b">0</div>
    <div class="team-streak" id="streak-b">Racha: 0 🔥</div>
  </div>
</div>

<div class="timer-bar">
  <button class="ctrl-btn start" onclick="startTimer()">▶ Iniciar</button>
  <div class="timer-display" id="timer-display">30</div>
  <div class="timer-track"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
  <button class="ctrl-btn" onclick="resetTimer()">↺ Reset</button>
  <button class="ctrl-btn danger" onclick="stopTimer()">■ Parar</button>
</div>

<div class="main">
  <!-- LEFT: QUESTION -->
  <div>
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title" id="round-label">Ronda 1 — Preguntas Abiertas</div>
        <div class="q-counter" id="q-counter">1 / 10</div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog"></div></div>
      <div class="q-body">
        <div class="q-ronda" id="q-ronda-tag"></div>
        <div class="q-text" id="q-text">Cargando pregunta...</div>
        <div class="q-answer" id="q-answer">✅ Respuesta correcta: <span id="q-answer-text"></span></div>
        <div class="opts-list" id="opts-list"></div>
        <button class="reveal-btn" id="reveal-btn" onclick="revealAnswer()">👁 Mostrar respuesta</button>
        <div class="nav-row">
          <button class="nav-btn prev" id="btn-prev" onclick="prevQ()">← Anterior</button>
          <button class="nav-btn next" id="btn-next" onclick="nextQ()">Siguiente →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: SIDEBAR -->
  <div class="sidebar">
    <!-- BUZZERS -->
    <div class="panel buzzer-panel">
      <div class="panel-head">
        <div class="panel-title">⚡ Pulsadores</div>
        <div class="q-counter" id="buzz-status-label">Esperando...</div>
      </div>
      <div class="buzzer-status">
        <div class="buz-row waiting team-a" id="buz-a">
          <div class="buz-dot"></div>
          <div class="buz-info">
            <div class="buz-name">Equipo A 🔴</div>
            <div class="buz-time" id="buz-time-a">—</div>
          </div>
          <div class="buz-badge waiting-badge" id="buz-badge-a">Listo</div>
        </div>
        <div class="buz-row waiting team-b" id="buz-b">
          <div class="buz-dot"></div>
          <div class="buz-info">
            <div class="buz-name">Equipo B 🔵</div>
            <div class="buz-time" id="buz-time-b">—</div>
          </div>
          <div class="buz-badge waiting-badge" id="buz-badge-b">Listo</div>
        </div>
      </div>
      <div class="judge-row">
        <button class="judge-btn correct" id="judge-correct" onclick="judge(true)" disabled>✅ Correcto</button>
        <button class="judge-btn wrong" id="judge-wrong" onclick="judge(false)" disabled>❌ Incorrecto</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">📋 Historial</div>
        <button style="background:none;border:none;font-size:11px;color:var(--muted);cursor:pointer" onclick="clearHistory()">Limpiar</button>
      </div>
      <div class="history-list" id="history-list">
        <div style="font-size:12px;color:var(--muted);text-align:center;padding:1rem">Sin historial aún</div>
      </div>
    </div>
  </div>
</div>

<script>
const TIMER_SEC = 30;
const POINTS = {correct:10, streak2:15, streak3:20, wrong:0};

const rounds = [
  {
    name: "Ronda 1 — Preguntas Abiertas",
    tag: "RONDA 1",
    questions: [
      {q:"¿Qué país ha ganado la mayor cantidad de Copas del Mundo FIFA en la historia?", answer:"Brasil", type:"open", feedback:"Brasil: 1958, 1962, 1970, 1994 y 2002 — 5 títulos"},
      {q:"¿Qué jugador protagonizó el famoso gol conocido como 'La Mano de Dios' en el Mundial de México 1986?", answer:"Diego Armando Maradona", type:"open", feedback:"Cuartos de final vs. Inglaterra. También marcó el 'Gol del Siglo' en ese mismo partido."},
      {q:"¿Qué legendario jugador es el único en la historia en haber ganado tres Copas del Mundo?", answer:"Pelé", type:"open", feedback:"1958, 1962 y 1970 — con 17 años ganó el primero."},
      {q:"¿Qué selección ganó el Mundial de Qatar 2022 tras una final épica contra Francia en penales?", answer:"Argentina", type:"open", feedback:"3-3 en tiempo reglamentario + prórroga, luego 4-2 en penales."},
      {q:"¿En qué año y torneo jugó Ecuador su primer Mundial de Fútbol absoluto?", answer:"Corea-Japón 2002", type:"open", feedback:"Ecuador clasificó bajo la dirección del 'Bolillo' Gómez."},
    ]
  },
  {
    name: "Ronda 2 — Opción Múltiple",
    tag: "RONDA 2",
    questions: [
      {q:"¿En qué ciudad se disputó la final del Mundial 2014?", answer:"Río de Janeiro (Maracaná)", type:"multi", opts:["Buenos Aires","São Paulo","Río de Janeiro","Brasilia"], correct:2, feedback:"Alemania venció 1-0 a Argentina con gol de Götze en tiempo extra."},
      {q:"¿Quién es el máximo goleador en la historia de los Mundiales?", answer:"Miroslav Klose (16 goles)", type:"multi", opts:["Pelé","Ronaldo Nazário","Gerd Müller","Miroslav Klose"], correct:3, feedback:"Klose anotó 16 goles en 4 Mundiales: 2002, 2006, 2010 y 2014."},
      {q:"¿Cuántos equipos participaron en el Mundial de Qatar 2022?", answer:"32 equipos", type:"multi", opts:["24","36","32","48"], correct:2, feedback:"Fue el último con 32 equipos; el de 2026 (USA-México-Canadá) tendrá 48."},
      {q:"¿Qué país organizó el primer Mundial de Fútbol de la historia en 1930?", answer:"Uruguay", type:"multi", opts:["Brasil","Italia","Uruguay","Argentina"], correct:2, feedback:"Uruguay ganó ese primer Mundial en casa, el 30 de julio de 1930."},
      {q:"¿Cómo se llama el trofeo que se entrega al campeón del mundo desde 1974?", answer:"Trofeo FIFA Copa del Mundo", type:"multi", opts:["Copa Jules Rimet","Trofeo FIFA Copa del Mundo","Copa Intercontinental","Balón de Oro"], correct:1, feedback:"Reemplazó a la Copa Jules Rimet tras el Mundial de Alemania 1974."},
    ]
  }
];

let allQuestions = [];
rounds.forEach(r => r.questions.forEach(q => allQuestions.push({...q, roundName:r.name, roundTag:r.tag})));

let current = 0;
let state = {ptsA:0, ptsB:0, streakA:0, streakB:0, buzzA:null, buzzB:null, winner:null};
let history = [];
let timerInterval = null, timeLeft = TIMER_SEC;
let answered = false;

function saveState(){
  localStorage.setItem('triviaState', JSON.stringify({...state, currentQ:current, answered}));
}

function loadState(){
  const s = localStorage.getItem('triviaState');
  if(s){const p=JSON.parse(s);state.ptsA=p.ptsA||0;state.ptsB=p.ptsB||0;state.streakA=p.streakA||0;state.streakB=p.streakB||0;}
}

function renderQ(){
  const q = allQuestions[current];
  document.getElementById('q-ronda-tag').textContent = q.roundTag + ' — ' + (q.type==='open'?'Abierta':'Opción múltiple');
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-answer').classList.remove('show');
  document.getElementById('q-answer-text').textContent = q.answer + (q.feedback ? ' — '+q.feedback : '');
  document.getElementById('q-counter').textContent = `${current+1} / ${allQuestions.length}`;
  document.getElementById('prog').style.width = `${((current)/allQuestions.length)*100}%`;

  const roundIdx = rounds.findIndex(r=>r.name===q.roundName);
  document.getElementById('round-label').textContent = q.roundName;

  const opts = document.getElementById('opts-list');
  opts.innerHTML = '';
  if(q.type==='multi' && q.opts){
    const letters=['A','B','C','D'];
    q.opts.forEach((o,i)=>{
      const row=document.createElement('div');
      row.className='opt-row'+(i===q.correct?' is-correct':'');
      row.innerHTML=`<div class="opt-letter">${letters[i]}</div>${o}${i===q.correct?' ✅':''}`;
      opts.appendChild(row);
    });
  }

  document.getElementById('btn-prev').disabled = current===0;
  document.getElementById('btn-next').textContent = current<allQuestions.length-1?'Siguiente →':'Fin';
  document.getElementById('btn-next').disabled = false;
  answered = false;
  resetBuzzers();
  resetTimer();
  updateScoreboard();
  saveState();
}

function revealAnswer(){
  document.getElementById('q-answer').classList.add('show');
}

function nextQ(){
  if(current<allQuestions.length-1){current++;renderQ();}
}
function prevQ(){
  if(current>0){current--;renderQ();}
}

// ── TIMER ──
function startTimer(){
  if(timerInterval) return;
  updateTimerDisplay();
  timerInterval = setInterval(()=>{
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft<=0){clearInterval(timerInterval);timerInterval=null;onTimerEnd();}
  },1000);
}
function stopTimer(){clearInterval(timerInterval);timerInterval=null;}
function resetTimer(){stopTimer();timeLeft=TIMER_SEC;updateTimerDisplay();}
function onTimerEnd(){
  document.getElementById('timer-display').textContent='⏰';
  document.getElementById('timer-fill').style.width='0%';
}
function updateTimerDisplay(){
  const el=document.getElementById('timer-display');
  const fill=document.getElementById('timer-fill');
  el.textContent=timeLeft;
  fill.style.width=`${(timeLeft/TIMER_SEC)*100}%`;
  el.className='timer-display'+(timeLeft<=10?' danger':timeLeft<=20?' warning':'');
  fill.className='timer-fill'+(timeLeft<=10?' danger':timeLeft<=20?' warning':'');
  localStorage.setItem('timerVal',timeLeft);
}

// ── BUZZERS ──
function resetBuzzers(){
  state.buzzA=null; state.buzzB=null; state.winner=null;
  renderBuzzers();
}
function renderBuzzers(){
  const hasWinner = state.winner!==null;
  const rowA=document.getElementById('buz-a');
  const rowB=document.getElementById('buz-b');
  rowA.className='buz-row team-a'+(state.winner==='A'?' winner':state.winner==='B'?' loser':' waiting');
  rowB.className='buz-row team-b'+(state.winner==='B'?' winner':state.winner==='A'?' loser':' waiting');
  document.getElementById('buz-badge-a').textContent=state.winner==='A'?'1°':state.buzzA?'Buzzeó':'Listo';
  document.getElementById('buz-badge-a').className='buz-badge'+(state.winner==='A'?' first':' waiting-badge');
  document.getElementById('buz-badge-b').textContent=state.winner==='B'?'1°':state.buzzB?'Buzzeó':'Listo';
  document.getElementById('buz-badge-b').className='buz-badge'+(state.winner==='B'?' first':' waiting-badge');
  document.getElementById('buz-time-a').textContent=state.buzzA?`Tiempo restante: ${state.buzzA}s`:'—';
  document.getElementById('buz-time-b').textContent=state.buzzB?`Tiempo restante: ${state.buzzB}s`:'—';
  document.getElementById('buzz-status-label').textContent=hasWinner?`Responde Equipo ${state.winner}`:'Esperando...';
  const canJudge=hasWinner && !answered;
  document.getElementById('judge-correct').disabled=!canJudge;
  document.getElementById('judge-wrong').disabled=!canJudge;
}

function judge(isCorrect){
  if(!state.winner || answered) return;
  answered=true;
  stopTimer();
  const team=state.winner;
  const q=allQuestions[current];
  let pts=0;
  if(isCorrect){
    if(team==='A'){state.streakA++;state.streakB=0;const s=state.streakA;pts=s>=3?POINTS.streak3:s>=2?POINTS.streak2:POINTS.correct;state.ptsA+=pts;}
    else{state.streakB++;state.streakA=0;const s=state.streakB;pts=s>=3?POINTS.streak3:s>=2?POINTS.streak2:POINTS.correct;state.ptsB+=pts;}
    localStorage.setItem('score_A',state.ptsA);
    localStorage.setItem('score_B',state.ptsB);
    localStorage.setItem('streak_A',state.streakA);
    localStorage.setItem('streak_B',state.streakB);
  } else {
    if(team==='A') state.streakA=0; else state.streakB=0;
    localStorage.setItem('streak_A',state.streakA);
    localStorage.setItem('streak_B',state.streakB);
  }
  history.unshift({q:q.q.substring(0,50)+'…', team, correct:isCorrect, pts, answer:q.answer});
  updateScoreboard();
  renderHistory();
  revealAnswer();
  saveState();
  document.getElementById('judge-correct').disabled=true;
  document.getElementById('judge-wrong').disabled=true;
}

function updateScoreboard(){
  document.getElementById('pts-a').textContent=state.ptsA;
  document.getElementById('pts-b').textContent=state.ptsB;
  document.getElementById('streak-a').textContent=`Racha: ${state.streakA} 🔥`;
  document.getElementById('streak-b').textContent=`Racha: ${state.streakB} 🔥`;
  const pA=document.getElementById('pts-a');
  const pB=document.getElementById('pts-b');
  pA.classList.toggle('winning',state.ptsA>state.ptsB);
  pB.classList.toggle('winning',state.ptsB>state.ptsA);
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!history.length){el.innerHTML='<div style="font-size:12px;color:var(--muted);text-align:center;padding:1rem">Sin historial aún</div>';return;}
  el.innerHTML=history.slice(0,15).map(h=>`
    <div class="hist-row">
      <div class="hist-icon">${h.correct?'✅':'❌'}</div>
      <div class="hist-info">
        <div class="hist-q">${h.q}</div>
        <div class="hist-detail">Equipo ${h.team} · ${h.answer}</div>
      </div>
      <div class="hist-pts ${h.correct?'pos':'neg'}">${h.correct?'+'+h.pts:'—'}</div>
    </div>`).join('');
}

function clearHistory(){history=[];renderHistory();}

// ── POLL localStorage for buzzer presses from iPads ──
function pollBuzzers(){
  const bzA=localStorage.getItem('buzz_A');
  const bzB=localStorage.getItem('buzz_B');
  if(!state.winner){
    if(bzA && !state.buzzA){
      state.buzzA=parseInt(bzA)||timeLeft;
      if(!bzB || parseInt(bzA)<parseInt(bzB)) state.winner='A';
    }
    if(bzB && !state.buzzB){
      state.buzzB=parseInt(bzB)||timeLeft;
      if(!bzA || parseInt(bzB)<parseInt(bzA)) state.winner='B';
    }
    if(state.buzzA && state.buzzB){
      state.winner=state.buzzA>=state.buzzB?'A':'B';
    }
    if(state.winner) renderBuzzers();
  }
}

// Clear buzzers when moving to new question
function resetBuzzers(){
  state.buzzA=null; state.buzzB=null; state.winner=null;
  localStorage.removeItem('buzz_A');
  localStorage.removeItem('buzz_B');
  renderBuzzers();
}

setInterval(pollBuzzers, 200);

loadState();
renderQ();
renderHistory();
</script>
