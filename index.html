<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trivia Mundialista ⚽ — Seleccionar Modo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#042C53;--blue-main:#185FA5;--gold:#EF9F27;--radius:14px}
body{font-family:'Inter',sans-serif;background:#0D1B2A;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.pitch{position:fixed;inset:0;background:repeating-linear-gradient(180deg,rgba(255,255,255,0.012) 0px,rgba(255,255,255,0.012) 60px,transparent 60px,transparent 120px);pointer-events:none}
.logo{font-family:'Oswald',sans-serif;font-size:2.8rem;font-weight:700;color:#fff;text-align:center;letter-spacing:0.03em;margin-bottom:.25rem;position:relative}
.logo span{color:var(--gold)}
.sub{color:rgba(255,255,255,0.5);font-size:13px;text-align:center;margin-bottom:3rem;letter-spacing:.05em;text-transform:uppercase}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;width:100%;max-width:680px}
.mode-card{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:var(--radius);padding:2rem 1.5rem;text-align:center;cursor:pointer;text-decoration:none;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:12px}
.mode-card:hover{background:rgba(55,138,221,0.15);border-color:rgba(55,138,221,0.5);transform:translateY(-3px)}
.mode-card.gold{border-color:rgba(239,159,39,0.4);background:rgba(239,159,39,0.08)}
.mode-card.gold:hover{background:rgba(239,159,39,0.18);border-color:var(--gold)}
.mode-icon{font-size:2.5rem}
.mode-title{font-family:'Oswald',sans-serif;font-size:1.2rem;font-weight:700;color:#fff;letter-spacing:.03em}
.mode-desc{font-size:12px;color:rgba(255,255,255,0.5);line-height:1.5}
.badge{background:rgba(239,159,39,0.2);color:var(--gold);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase}
.reset-btn{margin-top:2rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);padding:8px 20px;border-radius:8px;font-size:12px;cursor:pointer}
.reset-btn:hover{color:rgba(255,255,255,0.7)}
</style>
</head>
<body>
<div class="pitch"></div>
<div class="logo">TRIVIA <span>MUNDIALISTA</span> ⚽</div>
<div class="sub">Copa del Mundo — Concurso Interactivo</div>
<div class="grid">
  <a href="dashboard.html" class="mode-card gold">
    <span class="mode-icon">🎮</span>
    <span class="badge">Profesor</span>
    <div class="mode-title">DASHBOARD</div>
    <div class="mode-desc">Control del concurso, aprueba respuestas y maneja el marcador en tiempo real</div>
  </a>
  <a href="jugador.html?id=A" class="mode-card">
    <span class="mode-icon">🔴</span>
    <div class="mode-title">JUGADOR A</div>
    <div class="mode-desc">iPad del equipo A — Rojo. Toca para responder primero</div>
  </a>
  <a href="jugador.html?id=B" class="mode-card">
    <span class="mode-icon">🔵</span>
    <div class="mode-title">JUGADOR B</div>
    <div class="mode-desc">iPad del equipo B — Azul. Toca para responder primero</div>
  </a>
</div>
<button class="reset-btn" onclick="if(confirm('¿Resetear todo el concurso?')){localStorage.clear();alert('Reseteado.');}">🔄 Resetear concurso</button>
</body>
</html>
